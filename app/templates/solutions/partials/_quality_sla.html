{# Quality Attributes & SLAs — Quality attributes with test status + SLA contract summary
   Included in solutions/detail.html within solutionDetail() x-data scope #}
<div class="mt-7">
    <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-semibold text-foreground flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-primary inline-block"></span>
            Quality Attributes &amp; SLAs
        </h3>
        <div class="sad-actions flex gap-2">
            <button @click="openEntityModal('quality_attribute')" class="inline-flex items-center gap-1 h-7 px-2.5 rounded-md text-xs font-medium border border-input bg-background hover:bg-accent hover:text-accent-foreground transition-colors">+ Attribute</button>
            <button @click="openEntityModal('sla')" class="inline-flex items-center gap-1 h-7 px-2.5 rounded-md text-xs font-medium border border-input bg-background hover:bg-accent hover:text-accent-foreground transition-colors">+ SLA</button>
        </div>
    </div>
    {# Quality Attributes sub-section #}
    <template x-if="sadQualityAttributes.length > 0">
        <div class="mb-4">
            <h3 class="text-sm font-semibold text-foreground mb-2">Quality Attributes</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead><tr class="border-b border-border">
                        <th class="text-left py-2 px-3 text-muted-foreground font-medium">Attribute</th>
                        <th class="text-left py-2 px-3 text-muted-foreground font-medium">Type</th>
                        <th class="text-left py-2 px-3 text-muted-foreground font-medium">Target</th>
                        <th class="text-left py-2 px-3 text-muted-foreground font-medium">Current</th>
                        <th class="text-left py-2 px-3 text-muted-foreground font-medium">Status</th>
                        <th class="text-right py-2 px-3 text-muted-foreground font-medium sad-actions">Actions</th>
                    </tr></thead>
                    <tbody>
                        <template x-for="item in sadQualityAttributes" :key="item.id">
                            <tr class="border-b border-border/50 hover:bg-muted/30">
                                <td class="py-2 px-3 font-semibold text-foreground" x-text="item.attribute_name"></td>
                                <td class="py-2 px-3"><span class="inline-flex items-center px-2 py-0.5 rounded-md text-xs font-medium bg-purple-500/10 text-primary border border-purple-500/30" x-text="item.attribute_type"></span></td>
                                <td class="py-2 px-3 text-muted-foreground" x-text="item.target_value || '\u2014'"></td>
                                <td class="py-2 px-3 text-muted-foreground" x-text="item.current_value || '\u2014'"></td>
                                <td class="py-2 px-3"><span :class="{'text-emerald-600': item.test_status === 'passed', 'text-destructive': item.test_status === 'failed', 'text-muted-foreground': item.test_status === 'not_tested'}" x-text="item.test_status?.replace('_', ' ')"></span></td>
                                <td class="py-2 px-3 text-right sad-actions">
                                    <button @click="openEntityModal('quality_attribute', item)" class="text-primary hover:underline text-xs mr-2">Edit</button>
                                    <button @click="confirmDeleteEntity('quality_attribute', item)" class="text-destructive hover:underline text-xs">Delete</button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </template>
    {# SLAs sub-section #}
    <template x-if="sadSLAs.length > 0">
        <div>
            <h3 class="text-sm font-semibold text-foreground mb-2">Service Level Agreements</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead><tr class="border-b border-border">
                        <th class="text-left py-2 px-3 text-muted-foreground font-medium">SLA</th>
                        <th class="text-center py-2 px-3 text-muted-foreground font-medium">Availability</th>
                        <th class="text-center py-2 px-3 text-muted-foreground font-medium">Response (ms)</th>
                        <th class="text-center py-2 px-3 text-muted-foreground font-medium">RTO (hrs)</th>
                        <th class="text-center py-2 px-3 text-muted-foreground font-medium">RPO (hrs)</th>
                        <th class="text-left py-2 px-3 text-muted-foreground font-medium">Status</th>
                        <th class="text-right py-2 px-3 text-muted-foreground font-medium sad-actions">Actions</th>
                    </tr></thead>
                    <tbody>
                        <template x-for="item in sadSLAs" :key="item.id">
                            <tr class="border-b border-border/50 hover:bg-muted/30">
                                <td class="py-2 px-3 font-semibold text-foreground" x-text="item.sla_name"></td>
                                <td class="py-2 px-3 text-center font-mono" x-text="item.availability_target ? item.availability_target + '%' : '\u2014'"></td>
                                <td class="py-2 px-3 text-center font-mono" x-text="item.response_time_ms || '\u2014'"></td>
                                <td class="py-2 px-3 text-center font-mono" x-text="item.rto_hours || '\u2014'"></td>
                                <td class="py-2 px-3 text-center font-mono" x-text="item.rpo_hours || '\u2014'"></td>
                                <td class="py-2 px-3"><span :class="{'text-emerald-600': item.status === 'active', 'text-muted-foreground': item.status === 'draft'}" x-text="item.status"></span></td>
                                <td class="py-2 px-3 text-right sad-actions">
                                    <button @click="openEntityModal('sla', item)" class="text-primary hover:underline text-xs mr-2">Edit</button>
                                    <button @click="confirmDeleteEntity('sla', item)" class="text-destructive hover:underline text-xs">Delete</button>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </template>
    <template x-if="sadQualityAttributes.length === 0 && sadSLAs.length === 0">
        <p class="text-sm text-muted-foreground/60 italic">No quality attributes or SLAs defined. Quality criteria and service level agreements establish testable architecture constraints for ARB review.</p>
    </template>
</div>
