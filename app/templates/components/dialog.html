{# shadcn/ui Dialog Component (Alpine.js powered) #}
{% macro dialog(trigger_text='Open', title='', description='') %}
    <div x-data="{ dialogOpen: false }">
        <button @click="dialogOpen = true" class="inline-flex items-center justify-center rounded-md text-sm font-medium bg-primary text-primary-foreground hover:bg-primary/90 h-10 px-4 py-2" aria-label="Open">
            {{ trigger_text }}
        </button>
        
        <div
            x-show="dialogOpen" x-trap.inert="dialogOpen" x-cloak role="dialog" aria-modal="true"
            @keydown.escape.window="dialogOpen = false"
            x-transition.opacity
            class="modal-root hidden" style="position:fixed;inset:0;z-index:50;background:rgba(var(--background-rgb,255,255,255),0.8);backdrop-filter:blur(4px);" >  <!-- inline-style-ok -->
            <div
                @click.away="dialogOpen = false"
                x-transition
                class="fixed left-[50%] top-[50%] z-50 grid w-full max-w-lg translate-x-[-50%] translate-y-[-50%] gap-4 border bg-background p-6 shadow-lg sm:rounded-lg hidden" >
                <div class="flex flex-col space-y-1.5 text-center sm:text-left">
                    <h2 class="text-lg font-semibold leading-none tracking-tight">{{ title }}</h2>
                    {% if description %}
                        <p class="text-sm text-muted-foreground">{{ description }}</p>
                    {% endif %}
                </div>
                
                <div>
                    {{ caller() }}
                </div>
                
                <button
                    @click="dialogOpen = false"
                    class="absolute right-4 top-4 rounded-sm opacity-70 ring-offset-background transition-opacity hover:opacity-100"
                 aria-label="Open">
                    <i data-lucide="x" class="h-4 w-4"></i>
                </button>
            </div>
        </div>
    </div>
{% endmacro %}
