            <!-- ── LEFT: FILE EXPLORER ── -->
            <aside class="w-52 shrink-0 flex flex-col border-r border-border bg-card overflow-hidden">

                <!-- Search/filter + file actions -->
                <div class="px-2 py-2 border-b border-border shrink-0 space-y-1.5">
                    <div class="flex items-center gap-1.5 px-2 py-1.5 rounded bg-muted/50 text-xs text-muted-foreground border border-border/50">
                        <svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        <input type="text" x-model="fileFilter" placeholder="Filter files…" class="bg-transparent flex-1 outline-none text-foreground placeholder:text-muted-foreground text-xs">
                    </div>
                    <div class="flex items-center gap-1">
                        <button @click="createFile()" title="New file"
                                class="h-6 px-2 text-[10px] font-medium border border-border rounded text-muted-foreground hover:text-foreground hover:bg-muted/50 transition-colors flex items-center gap-1">
                            <i data-lucide="file-plus" class="h-3 w-3"></i> New
                        </button>
                        <button @click="searchFiles()" title="Search across files"
                                class="h-6 px-2 text-[10px] font-medium border border-border rounded text-muted-foreground hover:text-foreground hover:bg-muted/50 transition-colors flex items-center gap-1">
                            <i data-lucide="search" class="h-3 w-3"></i> Find
                        </button>
                    </div>
                </div>

                <!-- File tree -->
                <div class="flex-1 overflow-y-auto ide-scroll py-1 px-1">
                    <template x-for="[category, files] in Object.entries(groupedFiles)" :key="category">
                        <div class="mb-0.5">
                            <!-- Dir header -->
                            <div class="fitem flex items-center gap-1.5 px-2 py-0.5" @click="expandedDirs[category] = !expandedDirs[category]">
                                <svg class="w-3 h-3 text-muted-foreground shrink-0 transition-transform" :class="expandedDirs[category] !== false ? 'rotate-90' : ''" fill="currentColor" viewBox="0 0 20 20"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"/></svg>
                                <svg class="w-3.5 h-3.5 text-primary/70 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z"/></svg>
                                <span class="text-[11px] font-medium text-muted-foreground flex-1 truncate" x-text="category + '/'"></span>
                                <span class="text-[9px] text-muted-foreground/40" x-text="files.length"></span>
                            </div>
                            <!-- Files — use x-show (not x-if) so x-for scope inherits `files` from outer x-for -->
                            <div class="ml-4" x-show="expandedDirs[category] !== false">
                                <template x-for="path in files.filter(p => !fileFilter || p.toLowerCase().includes(fileFilter.toLowerCase()))" :key="path">
                                    <div class="fitem group flex items-center gap-1.5 px-2 py-0.5 relative"
                                         :class="selectedFile === path ? 'active' : ''"
                                         @click="selectFile(path)"
                                         @contextmenu.prevent="$refs['ctx_' + path.replaceAll('/','_')]?.classList.toggle('hidden')">
                                        <svg class="w-3 h-3 shrink-0 text-muted-foreground/50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
                                        <span class="fname text-[11px] flex-1 truncate text-foreground/80" x-text="path.split('/').pop()"></span>
                                        <!-- Status dots -->
                                        <span x-show="editedFiles.includes(path)" class="w-1.5 h-1.5 rounded-full bg-amber-400 shrink-0" title="Manually edited"></span>
                                        <!-- Inline action buttons (visible on hover) -->
                                        <div class="hidden group-hover:flex items-center gap-0.5 shrink-0">
                                            <button @click.stop="renameFile(path)" title="Rename / Move" class="w-4 h-4 rounded flex items-center justify-center text-muted-foreground hover:text-foreground hover:bg-muted/50"><i data-lucide="pencil" class="h-2.5 w-2.5"></i></button>
                                            <button @click.stop="duplicateFile(path)" title="Duplicate" class="w-4 h-4 rounded flex items-center justify-center text-muted-foreground hover:text-foreground hover:bg-muted/50"><i data-lucide="copy" class="h-2.5 w-2.5"></i></button>
                                            <button @click.stop="deleteFile(path)" title="Delete" class="w-4 h-4 rounded flex items-center justify-center text-muted-foreground hover:text-destructive hover:bg-destructive/10"><i data-lucide="trash-2" class="h-2.5 w-2.5"></i></button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Footer -->
                <div class="border-t border-border px-3 py-2 text-[10px] text-muted-foreground flex items-center justify-between shrink-0">
                    <span x-text="fileList.length + ' files'"></span>
                    <div class="flex items-center gap-1">
                        <span class="w-1.5 h-1.5 rounded-full bg-amber-400" title="manually edited"></span>
                        <span class="opacity-50 ml-0.5">edited</span>
                    </div>
                </div>
            </aside>
